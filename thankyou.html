<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>感謝訂購 | 陳家嚴選-鮮果好日</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      background: #f8f9fa;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    .logo-wrap {
      margin-bottom: 28px;
    }
    .logo-wrap img {
      height: 80px;
      object-fit: contain;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      max-width: 560px;
      width: 100%;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #497552, #3d614a);
      color: white;
      text-align: center;
      padding: 28px 24px 22px;
    }
    .card-header .check {
      font-size: 44px;
      line-height: 1;
      margin-bottom: 10px;
    }
    .card-header h1 {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .bank-img {
      width: 100%;
      display: block;
    }

    .card-body {
      padding: 28px 28px 32px;
    }

    .card-body p {
      font-size: 15px;
      line-height: 1.9;
      color: #444;
      margin-bottom: 6px;
    }

    .line-link-wrap {
      margin: 18px 0;
      text-align: center;
    }
    .line-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #06c755;
      color: white;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: bold;
      box-shadow: 0 4px 14px rgba(6,199,85,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .line-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(6,199,85,0.45);
    }
    .line-btn svg {
      width: 22px;
      height: 22px;
      fill: white;
    }

    .notice-box {
      background: #fff8e1;
      border: 1.5px solid #f0a500;
      border-radius: 10px;
      padding: 16px 18px;
      margin: 18px 0;
      font-size: 14px;
      color: #5a3e00;
      line-height: 1.85;
    }

    .closing {
      font-size: 14px;
      color: #666;
      line-height: 1.85;
      margin-top: 14px;
    }

    .back-btn {
      display: inline-block;
      margin-top: 28px;
      padding: 12px 36px;
      background: #497552;
      color: white;
      text-decoration: none;
      border-radius: 100px;
      font-size: 15px;
      font-weight: bold;
      transition: background 0.2s, transform 0.2s;
    }
    .back-btn:hover {
      background: #3d614a;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <a href="index.html"><img src="logo.png" alt="陳家嚴選-鮮果好日"></a>
  </div>

  <div class="card">

    <div class="card-header">
      <div class="check">✅</div>
      <h1>感謝您的訂購！</h1>
    </div>

    <img src="bank-info.jpg" alt="匯款帳號資訊" class="bank-img">

    <div class="card-body">

      <p>匯款完成後，請於 LINE 官方帳號告知：</p>
      <p style="padding-left: 8px; margin-top: 4px;">
        1. 訂購人手機<br>
        2. 匯款金額<br>
        3. 匯款帳號後五碼
      </p>

      <div class="line-link-wrap">
        <a href="https://lin.ee/OdJucNf" target="_blank" rel="noopener" class="line-btn">
          <!-- LINE icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.48 2 2 5.92 2 10.7c0 2.93 1.7 5.52 4.32 7.2-.18.65-.67 2.36-.77 2.72-.12.44.16.44.34.32.14-.09 2.19-1.48 3.08-2.09.64.09 1.3.14 1.97.14 5.52 0 10-3.92 10-8.7C22 5.92 17.52 2 12 2z"/>
          </svg>
          點我加入陳家嚴選-鮮果好日LINE官方帳號 對帳去
        </a>
      </div>

      <div class="notice-box">
        📣 完成匯款，款項確認後，即會依序為您安排出貨日，出貨當天會於LINE官方帳號上通知您！<br><br>
        【高雄大樹老欉玉荷包】預計 5/24 左右開採，產季僅 10 天！敬請把握！
      </div>

      <p class="closing">
        品質最嚴選，美味值得您期待，<br>
        陳家嚴選-鮮果好日再次感謝您的訂購！<br>
        祝您健康順心！
      </p>

    </div>
  </div>

  <a href="index.html" class="back-btn">← 回首頁</a>

</body>
</html>
